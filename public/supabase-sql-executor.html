<!DOCTYPE html>
<html>
<head>
  <title>Supabase SQL Executor</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    textarea { width: 100%; height: 200px; font-family: monospace; padding: 10px; }
    button { padding: 10px 20px; font-size: 16px; background: #18b6a3; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px 0; }
    button:hover { background: #0f9f8d; }
    .result { border: 1px solid #ccc; padding: 10px; margin-top: 10px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; background: #f5f5f5; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>Supabase SQL Executor</h1>
  <p>Führe SQL-Befehle in deiner Supabase-Datenbank aus:</p>
  
  <textarea id="sql" placeholder="SELECT * FROM receipt_items LIMIT 1;">ALTER TABLE receipt_items 
ADD COLUMN IF NOT EXISTS assigned_cost_center_id uuid 
REFERENCES cost_centers(id) ON DELETE SET NULL;</textarea>
  
  <button onclick="executeSql()">SQL ausführen</button>
  
  <div id="result" class="result" style="display: none;"></div>

  <script>
    async function executeSql() {
      const sql = document.getElementById('sql').value;
      const resultDiv = document.getElementById('result');
      
      if (!sql.trim()) {
        resultDiv.innerHTML = 'Bitte geben Sie SQL ein.';
        resultDiv.style.display = 'block';
        return;
      }

      resultDiv.innerHTML = 'Wird ausgeführt...';
      resultDiv.style.display = 'block';

      try {
        // Verwende die Supabase Service Role Key (hat volle Admin-Rechte)
        const apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmbWFmeW1odWRic3R3cnd0bHUiLCJyb2xlIjoic2VydmljZV9yb2xlIiwiaWF0IjoxNjkyMTEwMzUwLCJleHAiOjE3MDc2NjIzNTB9.h7Y0VqzAKjnJaKWtC0wXH5jqNm--oL-pCk0bYcwvP0s';

        const response = await fetch('https://pfmafymhudbstxwrwtlu.supabase.co/rest/v1/sql', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
            'apikey': apiKey,
          },
          body: JSON.stringify({ query: sql })
        });

        const data = await response.text();

        if (!response.ok) {
          resultDiv.innerHTML = `<span class="error">Fehler (${response.status}): ${data}</span>`;
        } else {
          resultDiv.innerHTML = `<span class="success">✓ Erfolgreich ausgeführt!</span>\n\n${data || 'OK'}`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<span class="error">Fehler: ${error.message}</span>`;
      }
    }

    // Auto-execute on load if hash contains #auto
    if (window.location.hash === '#auto') {
      executeSql();
    }
  </script>
</body>
</html>
